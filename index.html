<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario Alpha Phone</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1115;--card:#1a1d24;--card2:#222733;--line:#2c313c;--txt:#e8eaed;--mut:#9aa0ac;--acc:#3b82f6;--acc2:#2563eb;--ok:#22c55e;--okbg:#0e2a18;--warn:#f59e0b}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.4;padding:0 0 60px}
header{position:sticky;top:0;z-index:20;background:rgba(15,17,21,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px 16px}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--acc)}
.sub{color:var(--mut);font-size:12px;margin-top:2px}
.tools{max-width:1100px;margin:12px auto 0;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
input,select{background:var(--card);color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;outline:none}
input:focus,select:focus{border-color:var(--acc)}
#q{flex:1;min-width:180px}
.count{color:var(--mut);font-size:13px;margin-left:auto}
.count b{color:var(--ok)}
main{max-width:1100px;margin:0 auto;padding:0 16px}
.group{margin-top:22px}
.ghead{display:flex;align-items:baseline;gap:10px;padding:8px 2px;border-bottom:1px solid var(--line);position:sticky;top:64px;background:var(--bg)}
.ghead h2{font-size:16px;font-weight:700}
.gcount{color:var(--mut);font-size:13px}
.gcount b{color:var(--acc)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;margin-top:10px}
.item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;display:flex;gap:10px}
.thumb{width:56px;height:56px;border-radius:10px;background:var(--card2);border:1px solid var(--line);flex:0 0 auto;object-fit:cover;display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:20px;text-decoration:none}
.thumb img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.meta{flex:1;min-width:0}
.line1{font-weight:600;font-size:14px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag{font-size:11px;color:var(--mut);background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:2px 8px}
.imei{font-size:11px;color:var(--mut);margin-top:6px;font-family:ui-monospace,Menlo,Consolas,monospace}
.price{color:var(--ok);font-weight:700;font-size:14px;white-space:nowrap}
.row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
#gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50;padding:24px}
.gatebox{width:100%;max-width:340px;text-align:center}
.gatebox h1{font-size:20px;margin-bottom:6px}
.gatebox p{color:var(--mut);font-size:13px;margin-bottom:18px}
.gatebox input{width:100%;text-align:center;margin-bottom:10px;font-size:16px}
.gatebox button{width:100%;background:var(--acc);color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:600;cursor:pointer}
.gatebox button:active{background:var(--acc2)}
.err{color:#ef4444;font-size:13px;min-height:18px;margin-top:6px}
.empty{color:var(--mut);text-align:center;padding:40px 0}
footer{max-width:1100px;margin:28px auto 0;padding:0 16px;color:var(--mut);font-size:12px;text-align:center}
</style>
</head>
<body>
<div id="gate">
  <div class="gatebox">
    <h1>Inventario Alpha Phone</h1>
    <p>Introduce la contrase&ntilde;a para ver el inventario.</p>
    <input id="pw" type="password" placeholder="Contrase&ntilde;a" autocomplete="off" autofocus>
    <button id="go">Entrar</button>
    <div class="err" id="err"></div>
  </div>
</div>
<div id="app" style="display:none">
  <header>
    <div style="max-width:1100px;margin:0 auto">
      <div class="brand"><span class="dot"></span>Inventario Alpha Phone</div>
      <div class="sub">Actualizado: 13/06/2026</div>
      <div class="tools">
        <input id="q" type="search" placeholder="Buscar por modelo, color, IMEI, GB...">
        <select id="suc"><option value="">Todas las sucursales</option></select>
        <span class="count"><b id="cdisp">0</b> disponibles &middot; <span id="ctot">0</span> total</span>
      </div>
    </div>
  </header>
  <main id="list"></main>
  <footer>Alpha Phone &middot; Inventario cifrado &middot; Solo equipos DISPONIBLE/VENDIDO de la hoja INVENTARIO</footer>
</div>

let DATA = [];
function b64(s){const r=atob(s),a=new Uint8Array(r.length);for(let i=0;i<r.length;i++)a[i]=r.charCodeAt(i);return a;}
async function decrypt(pw){
  const salt=b64(ENC.salt), iv=b64(ENC.iv), ct=b64(ENC.ct);
  const baseKey=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:120000,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return JSON.parse(new TextDecoder().decode(pt));
}
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function render(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  const suc=document.getElementById('suc').value;
  let rows=DATA.filter(x=>x.estatus==='DISPONIBLE');
  if(suc) rows=rows.filter(x=>(x.ubic||'')===suc);
  if(q) rows=rows.filter(x=>(x.modelo+' '+x.raw+' '+x.color+' '+x.gb+' '+x.imei+' '+(x.ubic||'')).toLowerCase().includes(q));
  const groups={};
  for(const x of rows){(groups[x.modelo]=groups[x.modelo]||[]).push(x);}
  const names=Object.keys(groups).sort((a,b)=>a.localeCompare(b,'es'));
  const el=document.getElementById('list');
  if(!rows.length){el.innerHTML='<div class="empty">No hay equipos disponibles que coincidan.</div>';return;}
  let h='';
  for(const n of names){
    const g=groups[n].sort((a,b)=>(a.color+a.gb).localeCompare(b.color+b.gb,'es'));
    h+='<section class="group"><div class="ghead"><h2>'+esc(n)+'</h2><span class="gcount"><b>'+g.length+'</b> disp.</span></div><div class="grid">';
    for(const x of g){
      const thumb = x.img
        ? '<a class="thumb" href="'+esc(x.fld||x.img)+'" target="_blank" rel="noopener"><img loading="lazy" src="'+esc(x.img)+'" alt=""></a>'
        : (x.fld ? '<a class="thumb" href="'+esc(x.fld)+'" target="_blank" rel="noopener">&#128247;</a>' : '<span class="thumb">&#128241;</span>');
      const tags=[x.color,x.gb,x.sim,x.grado?('Grado '+x.grado):'',x.ubic].filter(Boolean).map(t=>'<span class="tag">'+esc(t)+'</span>').join('');
      const price=x.precio?('<span class="price">'+esc(x.precio)+'</span>'):'';
      h+='<div class="item">'+thumb+'<div class="meta"><div class="row"><div class="line1">'+esc(x.raw||x.modelo)+'</div>'+price+'</div><div class="tags">'+tags+'</div><div class="imei">IMEI '+esc(x.imei)+'</div></div></div>';
    }
    h+='</div></section>';
  }
  el.innerHTML=h;
  document.getElementById('cdisp').textContent=rows.length;
  document.getElementById('ctot').textContent=DATA.filter(x=>x.estatus==='DISPONIBLE').length;
}
function fillSuc(){
  const s=[...new Set(DATA.filter(x=>x.estatus==='DISPONIBLE'&&x.ubic).map(x=>x.ubic))].sort((a,b)=>a.localeCompare(b,'es'));
  const sel=document.getElementById('suc');
  for(const v of s){const o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);}
}
async function enter(){
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err'); err.textContent='';
  try{
    DATA=await decrypt(pw);
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='';
    fillSuc(); render();
  }catch(e){ err.textContent='Contraseña incorrecta.'; }
}
document.getElementById('go').addEventListener('click',enter);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')enter();});
document.getElementById('q').addEventListener('input',render);
document.getElementById('suc').addEventListener('change',render);
</script>
