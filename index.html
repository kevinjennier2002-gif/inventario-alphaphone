<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inventario Alpha Phone</title>
<style>
:root{--bg:#0b1020;--card:#161c2e;--ac:#3b82f6;--ac2:#22c55e;--tx:#e7ecf5;--mut:#93a0b8;--bd:#26304a}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--tx)}
#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(900px 600px at 50% -10%,#1b2540,transparent),var(--bg)}
.glass{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:28px;width:min(92vw,360px);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.45)}
.glass h1{font-size:20px;margin:6px 0 2px}.glass p{color:var(--mut);font-size:13px;margin:0 0 18px}
input,select,button{font-size:15px}
#pw{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--bd);background:#0e1424;color:var(--tx);text-align:center;letter-spacing:2px}
.btn{margin-top:12px;width:100%;padding:12px;border:0;border-radius:10px;background:var(--ac);color:#fff;font-weight:600;cursor:pointer}
.btn:hover{filter:brightness(1.08)}
#err{color:#f87171;font-size:13px;height:16px;margin-top:8px}
#app{display:none;max-width:1100px;margin:0 auto;padding:16px}
header.top{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:8px 4px 14px}
header.top h2{margin:0;font-size:20px;flex:1}
.badge{background:var(--card);border:1px solid var(--bd);border-radius:999px;padding:6px 12px;font-size:13px;color:var(--mut)}
.tabs{display:flex;gap:8px;margin:6px 0 14px}
.tab{flex:1;padding:10px;text-align:center;border-radius:10px;background:var(--card);border:1px solid var(--bd);cursor:pointer;font-weight:600;color:var(--mut)}
.tab.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.controls input,.controls select{padding:10px 12px;border-radius:10px;border:1px solid var(--bd);background:#0e1424;color:var(--tx)}
.controls input[type=search]{flex:1;min-width:160px}
.group{margin-bottom:14px;border:1px solid var(--bd);border-radius:14px;overflow:hidden;background:var(--card)}
.ghead{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;background:#10162a}
.ghead .gname{font-weight:700;flex:1}
.gcount{background:var(--ac);color:#fff;border-radius:999px;padding:2px 10px;font-size:13px;font-weight:700}
.gbody{display:none;padding:6px 10px 12px}
.group.open .gbody{display:block}
.dev{display:flex;align-items:center;gap:10px;padding:9px 8px;border-top:1px solid var(--bd)}
.thumb{width:40px;height:40px;border-radius:8px;background:#0e1424;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:18px;flex-shrink:0}
.thumb:hover{border-color:var(--ac)}
.dmeta{flex:1;min-width:0}
.dmeta .l1{font-size:14px}.dmeta .l2{font-size:12px;color:var(--mut)}
.chip{display:inline-block;background:#0e1424;border:1px solid var(--bd);border-radius:6px;padding:1px 7px;margin:2px 4px 0 0;font-size:11px;color:var(--mut)}
.price{font-weight:700;color:var(--ac2);font-size:14px;white-space:nowrap}
.sales-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.scard{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:14px;text-align:center}
.scard .n{font-size:26px;font-weight:800}.scard .t{font-size:12px;color:var(--mut)}
.srow{display:flex;align-items:center;gap:10px;padding:9px 12px;border-top:1px solid var(--bd)}
.srow .rk{width:26px;height:26px;border-radius:8px;background:var(--ac);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.srow .nm{flex:1}.srow .ct{font-weight:700}
.bar{height:6px;border-radius:4px;background:var(--ac);margin-top:4px}
.note{color:var(--mut);font-size:12px;text-align:center;padding:14px 4px}
@media(max-width:560px){.sales-cards{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div id="gate">
  <div class="glass">
    <div style="font-size:34px">🔒</div>
    <h1>Alpha Phone</h1>
    <p>Inventario cifrado</p>
    <input id="pw" type="password" placeholder="Contraseña" autocomplete="off">
    <button class="btn" id="go">Entrar</button>
    <div id="err"></div>
  </div>
</div>

<div id="app">
  <header class="top">
    <h2>📱 Inventario Alpha Phone</h2>
    <span class="badge" id="bAvail"></span>
    <span class="badge" id="bGen"></span>
  </header>
  <div class="tabs">
    <div class="tab on" data-v="inv" id="tabInv">Inventario</div>
    <div class="tab" data-v="sales" id="tabSales">Ventas</div>
  </div>

  <section id="viewInv">
    <div class="controls">
      <input type="search" id="q" placeholder="Buscar modelo, color, IMEI…">
      <select id="suc"></select>
    </div>
    <div id="groups"></div>
  </section>

  <section id="viewSales" style="display:none">
    <div class="controls">
      <select id="period">
        <option value="7">1 semana</option>
        <option value="14">2 semanas</option>
        <option value="30" selected>1 mes</option>
        <option value="60">2 meses</option>
        <option value="90">3 meses</option>
        <option value="120">4 meses</option>
        <option value="180">6 meses</option>
      </select>
    </div>
    <div class="sales-cards">
      <div class="scard"><div class="n" id="sTotal">0</div><div class="t">Ventas totales</div></div>
      <div class="scard"><div class="n" id="sModels">0</div><div class="t">Modelos vendidos</div></div>
      <div class="scard"><div class="n" id="sTop">—</div><div class="t">Más vendido</div></div>
    </div>
    <div id="salesList" class="group"></div>
  </section>
  <div class="note" id="footNote"></div>
</div>

var DATA = null;

function b64(s){var bin=atob(s),u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}

async function decrypt(pw){
  var enc=new TextEncoder();
  var keyMat=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  var key=await crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:b64(BLOB.salt),iterations:BLOB.it,hash:'SHA-256'},
    keyMat,{name:'AES-GCM',length:256},false,['decrypt']);
  var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(BLOB.iv)},key,b64(BLOB.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

// ---- ordenar por generacion 17 -> 16 -> ... ----
function genRank(modelo){
  var m=modelo.toUpperCase();
  var num=m.match(/IPHONE\s*(\d{1,2})/);
  var g=num?parseInt(num[1],10):-1;
  if(m.indexOf('IPHONE')<0) g=-100; // no-iphone al final
  var variant=0;
  if(/PRO\s*MAX/.test(m))variant=4;else if(/PRO/.test(m))variant=3;
  else if(/PLUS/.test(m))variant=2;else if(/AIR/.test(m))variant=1;else variant=0;
  return {g:g,variant:variant};
}
function cmpModel(a,b){
  var ra=genRank(a),rb=genRank(b);
  if(rb.g!==ra.g)return rb.g-ra.g;
  if(rb.variant!==ra.variant)return rb.variant-ra.variant;
  return a.localeCompare(b);
}

function driveSearch(imei){return 'https://drive.google.com/drive/search?q='+encodeURIComponent(imei);}

function renderInv(){
  var q=document.getElementById('q').value.trim().toLowerCase();
  var suc=document.getElementById('suc').value;
  var items=DATA.inv.filter(function(d){
    if(suc&&d.ubic!==suc)return false;
    if(q){var hay=(d.modelo+' '+d.color+' '+d.gb+' '+d.sim+' '+d.imei+' '+d.grado).toLowerCase();if(hay.indexOf(q)<0)return false;}
    return true;
  });
  var byModel={};
  items.forEach(function(d){(byModel[d.modelo]=byModel[d.modelo]||[]).push(d);});
  var models=Object.keys(byModel).sort(cmpModel);
  var html='';
  models.forEach(function(mo){
    var list=byModel[mo];
    html+='<div class="group open"><div class="ghead" onclick="this.parentNode.classList.toggle(\'open\')">'+
      '<span class="gname">'+esc(mo)+'</span><span class="gcount">'+list.length+'</span></div><div class="gbody">';
    list.forEach(function(d){
      html+='<div class="dev">'+
        '<a class="thumb" href="'+driveSearch(d.imei)+'" target="_blank" rel="noopener" title="Ver foto en Drive (IMEI '+esc(d.imei)+')">📷</a>'+
        '<div class="dmeta"><div class="l1">'+esc(d.color||'—')+' · '+esc(d.gb||'')+'</div>'+
        '<div class="l2">'+
          (d.sim?'<span class="chip">'+esc(d.sim)+'</span>':'')+
          (d.grado?'<span class="chip">Grado '+esc(d.grado)+'</span>':'')+
          (d.bateria?'<span class="chip">🔋'+esc(d.bateria)+'</span>':'')+
          '<span class="chip">📍'+esc(d.ubic)+'</span>'+
          (d.imei?'<span class="chip">'+esc(d.imei)+'</span>':'')+
        '</div></div>'+
        (d.precio?'<div class="price">$'+esc(d.precio)+'</div>':'')+
      '</div>';
    });
    html+='</div></div>';
  });
  if(!models.length)html='<div class="note">Sin equipos que coincidan.</div>';
  document.getElementById('groups').innerHTML=html;
}

function renderSales(){
  var days=parseInt(document.getElementById('period').value,10);
  var now=new Date();var cut=new Date();cut.setDate(now.getDate()-days);
  var counts={};var total=0;
  DATA.sales.forEach(function(s){
    if(!s.date)return;
    var d=new Date(s.date+'T00:00:00');
    if(d>=cut&&d<=now){counts[s.modelo]=(counts[s.modelo]||0)+1;total++;}
  });
  var arr=Object.keys(counts).map(function(k){return [k,counts[k]];}).sort(function(a,b){return b[1]-a[1];});
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sModels').textContent=arr.length;
  document.getElementById('sTop').textContent=arr.length?shortName(arr[0][0]):'—';
  document.getElementById('sTop').style.fontSize=arr.length?'15px':'26px';
  var max=arr.length?arr[0][1]:1;
  var html='';
  arr.forEach(function(p,i){
    html+='<div class="srow"><div class="rk">'+(i+1)+'</div><div class="nm">'+esc(p[0])+
      '<div class="bar" style="width:'+Math.max(8,Math.round(p[1]/max*100))+'%"></div></div>'+
      '<div class="ct">'+p[1]+'</div></div>';
  });
  if(!arr.length)html='<div class="note">Sin ventas en este periodo.</div>';
  document.getElementById('salesList').innerHTML=html;
}
function shortName(m){return m.replace(/IPHONE/i,'iP').trim();}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

function boot(){
  document.getElementById('bAvail').textContent='✅ '+DATA.n_avail+' disponibles';
  document.getElementById('bGen').textContent='Actualizado '+DATA.generated;
  document.getElementById('footNote').textContent='Ventas registradas: '+DATA.n_sales+
    ' · El contador usa la fecha de hoy del dispositivo. Las miniaturas 📷 abren la búsqueda en Drive por IMEI.';
  // sucursales
  var sucs={};DATA.inv.forEach(function(d){sucs[d.ubic]=(sucs[d.ubic]||0)+1;});
  var sel=document.getElementById('suc');
  sel.innerHTML='<option value="">Todas las sucursales ('+DATA.inv.length+')</option>'+
    Object.keys(sucs).sort().map(function(s){return '<option value="'+esc(s)+'">'+esc(s)+' ('+sucs[s]+')</option>';}).join('');
  document.getElementById('q').addEventListener('input',renderInv);
  sel.addEventListener('change',renderInv);
  document.getElementById('period').addEventListener('change',renderSales);
  document.getElementById('tabInv').onclick=function(){sw('inv');};
  document.getElementById('tabSales').onclick=function(){sw('sales');};
  renderInv();renderSales();
}
function sw(v){
  document.getElementById('tabInv').classList.toggle('on',v==='inv');
  document.getElementById('tabSales').classList.toggle('on',v==='sales');
  document.getElementById('viewInv').style.display=v==='inv'?'':'none';
  document.getElementById('viewSales').style.display=v==='sales'?'':'none';
}

async function tryEnter(){
  var pw=document.getElementById('pw').value;
  document.getElementById('err').textContent='';
  try{
    DATA=await decrypt(pw);
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    boot();
  }catch(e){
    document.getElementById('err').textContent='Contraseña incorrecta';
    document.getElementById('pw').value='';
  }
}
document.getElementById('go').onclick=tryEnter;
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')tryEnter();});
document.getElementById('pw').focus();
</script>
