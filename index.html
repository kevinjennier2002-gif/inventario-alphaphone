<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario Alpha Phone</title>
<style>
  :root{--bg:#0f1220;--card:#1b1f33;--mut:#8b93b3;--acc:#3b82f6;--ok:#22c55e;--line:#2a2f4a;--txt:#eef1fb}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt)}
  #gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:10}
  #gate .box{background:var(--card);padding:28px 24px;border-radius:16px;width:90%;max-width:340px;text-align:center;border:1px solid var(--line)}
  #gate h1{font-size:19px;margin:0 0 4px}
  #gate p{color:var(--mut);font-size:13px;margin:0 0 18px}
  input,select{font-size:15px;padding:11px 12px;border-radius:10px;border:1px solid var(--line);background:#11152a;color:var(--txt);width:100%}
  button{margin-top:12px;width:100%;padding:11px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
  #err{color:#f87171;font-size:13px;min-height:18px;margin-top:8px}
  header{position:sticky;top:0;background:rgba(15,18,32,.96);backdrop-filter:blur(6px);padding:14px 16px;border-bottom:1px solid var(--line);z-index:5}
  header h2{margin:0;font-size:17px}
  .sub{color:var(--mut);font-size:12px;margin-top:3px}
  .tot{display:inline-block;background:rgba(34,197,94,.15);color:var(--ok);font-weight:700;border-radius:999px;padding:3px 11px;font-size:13px;margin-top:8px}
  .ctrls{display:flex;gap:8px;padding:12px 16px;flex-wrap:wrap}
  .ctrls>*{flex:1;min-width:130px}
  .chk{display:flex;align-items:center;gap:6px;flex:0 0 auto;color:var(--mut);font-size:13px;min-width:0}
  .chk input{width:auto}
  main{padding:0 16px 40px}
  .grp{margin-top:18px}
  .grp h3{font-size:15px;margin:0 0 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:6px}
  .grp h3 .c{background:var(--card);color:var(--mut);font-size:12px;border-radius:999px;padding:2px 9px}
  .card{display:flex;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:8px;align-items:center}
  .thumb{width:54px;height:54px;border-radius:9px;object-fit:cover;background:#11152a;flex:0 0 54px;display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:20px;text-decoration:none}
  .info{flex:1;min-width:0}
  .info .l1{font-size:14px;font-weight:600}
  .info .l2{font-size:12px;color:var(--mut);margin-top:2px}
  .pill{display:inline-block;background:#11152a;border:1px solid var(--line);border-radius:6px;padding:1px 6px;margin-right:5px;font-size:11px}
  .price{font-weight:700;color:var(--ok);font-size:14px;white-space:nowrap}
  .sold{opacity:.55}
  .sold .price{color:var(--mut)}
  .empty{color:var(--mut);text-align:center;padding:40px 0}
</style>
</head>
<body>
<div id="gate">
  <div class="box">
    <h1>Inventario Alpha Phone</h1>
    <p>Ingresa la contraseña para ver el inventario</p>
    <input id="pw" type="password" placeholder="Contraseña" autocomplete="off">
    <button id="go">Entrar</button>
    <div id="err"></div>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <h2>Inventario Alpha Phone</h2>
    <div class="sub">Actualizado: 13/06/2026</div>
    <span class="tot" id="tot"></span>
  </header>
  <div class="ctrls">
    <input id="q" placeholder="Buscar modelo, color, IMEI…">
    <select id="suc"><option value="">Todas las sucursales</option></select>
    <label class="chk"><input type="checkbox" id="vend"> Vendidos</label>
  </div>
  <main id="list"></main>
</div>

let DATA = [];

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function decrypt(pw){
  const salt = b64(ENC.salt), iv = b64(ENC.iv), ct = b64(ENC.ct);
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:120000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function render(){
  const q = document.getElementById('q').value.trim().toLowerCase();
  const suc = document.getElementById('suc').value;
  const showVend = document.getElementById('vend').checked;
  let items = DATA.filter(x => showVend ? true : x.estatus === 'DISPONIBLE');
  if(suc) items = items.filter(x => (x.ubic||'') === suc);
  if(q) items = items.filter(x => (x.modelo+' '+x.raw+' '+x.color+' '+x.gb+' '+x.imei+' '+(x.ubic||'')).toLowerCase().includes(q));

  const groups = {};
  for(const x of items){ (groups[x.modelo] = groups[x.modelo] || []).push(x); }
  const names = Object.keys(groups).sort();

  const disp = DATA.filter(x=>x.estatus==='DISPONIBLE').length;
  document.getElementById('tot').textContent = disp + ' disponibles';

  const list = document.getElementById('list');
  if(!names.length){ list.innerHTML = '<div class="empty">Sin resultados</div>'; return; }
  let html = '';
  for(const n of names){
    const arr = groups[n];
    html += '<div class="grp"><h3>'+esc(n)+'<span class="c">'+arr.length+'</span></h3>';
    for(const x of arr){
      const thumb = x.img
        ? '<a class="thumb" href="'+esc(x.fld||x.img)+'" target="_blank" rel="noopener"><img class="thumb" src="'+esc(x.img)+'" alt="" loading="lazy"></a>'
        : '<span class="thumb">📱</span>';
      const meta = [x.color, x.gb, x.grado, x.sim].filter(Boolean).map(v=>'<span class="pill">'+esc(v)+'</span>').join('');
      const suchtml = x.ubic ? '<span class="pill">📍'+esc(x.ubic)+'</span>' : '';
      const price = x.precio ? '<div class="price">$'+esc(x.precio)+'</div>' : '';
      html += '<div class="card'+(x.estatus==='VENDIDO'?' sold':'')+'">'+thumb+
              '<div class="info"><div class="l1">'+esc(x.raw||n)+'</div>'+
              '<div class="l2">'+meta+suchtml+'</div>'+
              '<div class="l2">IMEI: '+esc(x.imei)+(x.estatus==='VENDIDO'?' · VENDIDO':'')+'</div></div>'+price+'</div>';
    }
    html += '</div>';
  }
  list.innerHTML = html;
}

function initFilters(){
  const sucs = [...new Set(DATA.filter(x=>x.estatus==='DISPONIBLE' && x.ubic).map(x=>x.ubic))].sort();
  const sel = document.getElementById('suc');
  for(const s of sucs){ const o=document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); }
  document.getElementById('q').addEventListener('input', render);
  sel.addEventListener('change', render);
  document.getElementById('vend').addEventListener('change', render);
}

async function unlock(){
  const err = document.getElementById('err');
  err.textContent = '';
  try{
    DATA = await decrypt(document.getElementById('pw').value);
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initFilters();
    render();
  }catch(e){
    err.textContent = 'Contraseña incorrecta';
  }
}
document.getElementById('go').addEventListener('click', unlock);
document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); });
</script>
