<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inventario Alpha Phone</title>
<style>
:root{--bg:#0f1115;--card:#1a1d24;--acc:#4f8cff;--txt:#e8eaed;--mut:#9aa0aa;--ok:#3ec46d}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt)}
#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:10}
.box{background:var(--card);padding:28px;border-radius:14px;width:320px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.5)}
h1{font-size:20px;margin:0 0 4px}.sub{color:var(--mut);font-size:13px;margin-bottom:18px}
input,select,button{font-size:15px;border-radius:9px;border:1px solid #2c313c;background:#12151b;color:var(--txt);padding:10px 12px}
#pw{width:100%;margin-bottom:12px}
button{background:var(--acc);border:none;color:#fff;cursor:pointer;width:100%;font-weight:600}
button:hover{filter:brightness(1.08)}
.err{color:#ff6b6b;font-size:13px;height:16px;margin-top:8px}
header{padding:16px 18px;border-bottom:1px solid #232833;position:sticky;top:0;background:var(--bg);z-index:5}
.hrow{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.title{font-size:18px;font-weight:700;margin-right:auto}
.badge{background:var(--card);padding:6px 12px;border-radius:20px;font-size:13px;color:var(--mut)}
.badge b{color:var(--ok)}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.controls input,.controls select{flex:1;min-width:140px}
.tabs{display:flex;gap:8px;margin-top:12px}
.tab{background:var(--card);border:1px solid #2c313c;padding:8px 16px;border-radius:9px;cursor:pointer;color:var(--mut);font-weight:600}
.tab.on{background:var(--acc);color:#fff;border-color:var(--acc)}
main{padding:16px 18px;max-width:1100px;margin:0 auto}
.mgroup{background:var(--card);border-radius:12px;margin-bottom:14px;overflow:hidden}
.mhead{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.mhead .name{font-weight:700;font-size:16px}
.mhead .cnt{background:var(--acc);color:#fff;border-radius:20px;padding:2px 11px;font-size:13px;font-weight:700}
.mhead .chev{margin-left:auto;color:var(--mut);transition:.2s}
.mgroup.open .chev{transform:rotate(90deg)}
.mbody{display:none;padding:0 12px 12px}
.mgroup.open .mbody{display:block}
.dev{display:flex;gap:12px;align-items:center;background:#12151b;border-radius:10px;padding:10px;margin-top:8px;flex-wrap:wrap}
.thumb{width:52px;height:52px;border-radius:9px;background:#232833;display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:11px;text-decoration:none;flex-shrink:0;text-align:center;line-height:1.1}
.thumb:hover{background:#2c313c;color:var(--acc)}
.dinfo{flex:1;min-width:200px}
.dinfo .l1{font-weight:600}.dinfo .l2{color:var(--mut);font-size:13px;margin-top:2px}
.pill{display:inline-block;background:#232833;border-radius:6px;padding:1px 7px;font-size:12px;margin:2px 4px 0 0;color:var(--mut)}
.price{font-weight:700;color:var(--ok)}
.suc{font-size:12px;background:#2a2f3a;border-radius:6px;padding:2px 8px;color:var(--txt)}
.stat{background:var(--card);border-radius:12px;padding:16px;margin-bottom:14px}
.stat .big{font-size:34px;font-weight:800;color:var(--acc)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.srow{display:flex;justify-content:space-between;padding:8px 12px;background:#12151b;border-radius:8px;margin-top:6px}
.srow .n{font-weight:600}.srow .v{color:var(--ok);font-weight:700}
.rank{color:var(--mut);width:22px;display:inline-block}
.hidden{display:none!important}
.note{color:var(--mut);font-size:12px;margin-top:6px}
</style></head><body>

<div id="gate"><div class="box">
<h1>Alpha Phone</h1><div class="sub">Inventario cifrado</div>
<input id="pw" type="password" placeholder="Contraseña" autofocus>
<button id="go">Abrir</button>
<div class="err" id="err"></div>
</div></div>

<div id="app" class="hidden">
<header>
 <div class="hrow">
   <span class="title">Inventario Alpha Phone</span>
   <span class="badge">Disponibles: <b id="bDisp">0</b></span>
   <span class="badge">Ventas: <b id="bVen">0</b></span>
   <span class="badge" id="bGen"></span>
 </div>
 <div class="tabs">
   <div class="tab on" data-v="inv" id="tInv">Inventario</div>
   <div class="tab" data-v="ven" id="tVen">Contador de ventas</div>
 </div>
 <div class="controls" id="invCtl">
   <input id="q" placeholder="Buscar modelo, color, IMEI, grado…">
   <select id="suc"><option value="">Todas las sucursales</option></select>
 </div>
 <div class="controls hidden" id="venCtl">
   <select id="per">
     <option value="7">Última semana</option>
     <option value="14">Últimas 2 semanas</option>
     <option value="30">Último mes</option>
     <option value="60">Últimos 2 meses</option>
     <option value="90">Últimos 3 meses</option>
     <option value="120">Últimos 4 meses</option>
     <option value="180" selected>Últimos 6 meses</option>
     <option value="9999">Histórico</option>
   </select>
 </div>
</header>
<main>
  <div id="invView"></div>
  <div id="venView" class="hidden"></div>
</main>
</div>

<script>
const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decrypt(pw){
  const e=JSON.parse(document.getElementById('payload').textContent);
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(e.salt),iterations:e.iter,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(e.iv)},key,b64(e.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
let DATA=null;
document.getElementById('go').onclick=unlock;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
async function unlock(){
  const err=document.getElementById('err');err.textContent='';
  try{
    DATA=await decrypt(document.getElementById('pw').value);
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    boot();
  }catch(_){err.textContent='Contraseña incorrecta';}
}
function boot(){
  document.getElementById('bDisp').textContent=DATA.disponibles_total;
  document.getElementById('bVen').textContent=DATA.ventas_total;
  document.getElementById('bGen').textContent='Actualizado '+DATA.generado;
  const suc=document.getElementById('suc');
  DATA.sucursales.forEach(x=>{const o=document.createElement('option');o.value=x;o.textContent=x;suc.appendChild(o);});
  document.getElementById('q').oninput=renderInv;
  suc.onchange=renderInv;
  document.getElementById('per').onchange=renderVen;
  document.getElementById('tInv').onclick=()=>swap('inv');
  document.getElementById('tVen').onclick=()=>swap('ven');
  renderInv();renderVen();
}
function swap(v){
  const inv=v==='inv';
  document.getElementById('tInv').classList.toggle('on',inv);
  document.getElementById('tVen').classList.toggle('on',!inv);
  document.getElementById('invView').classList.toggle('hidden',!inv);
  document.getElementById('venView').classList.toggle('hidden',inv);
  document.getElementById('invCtl').classList.toggle('hidden',!inv);
  document.getElementById('venCtl').classList.toggle('hidden',inv);
}
function driveSearch(imei){return 'https://drive.google.com/drive/search?q='+encodeURIComponent(imei);}
function renderInv(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  const sf=document.getElementById('suc').value;
  const root=document.getElementById('invView');root.innerHTML='';
  let shown=0;
  DATA.modelos.forEach(g=>{
    let items=g.items.filter(d=>{
      if(sf && d.ubicacion!==sf) return false;
      if(!q) return true;
      return (g.modelo+' '+d.color+' '+d.gb+' '+d.grado+' '+d.imei+' '+d.sim).toLowerCase().includes(q);
    });
    if(!items.length) return;
    shown+=items.length;
    const el=document.createElement('div');el.className='mgroup';
    let rows=items.map(d=>`<div class="dev">
      <a class="thumb" href="${driveSearch(d.imei)}" target="_blank" title="Abrir fotos en Drive">📷<br>fotos</a>
      <div class="dinfo"><div class="l1">${g.modelo} · ${d.color||''} ${d.gb||''}</div>
      <div class="l2"><span class="pill">Grado ${d.grado||'—'}</span><span class="pill">${d.sim||''}</span><span class="pill">Bat ${d.bateria||'—'}</span><span class="pill">IMEI ${d.imei||'—'}</span></div></div>
      <div style="text-align:right"><div class="price">${d.precio?('$'+Number(d.precio).toLocaleString('es-MX')):''}</div><div class="suc">${d.ubicacion||''}</div></div>
    </div>`).join('');
    el.innerHTML=`<div class="mhead"><span class="name">${g.modelo}</span><span class="cnt">${items.length}</span><span class="chev">▶</span></div><div class="mbody">${rows}</div>`;
    el.querySelector('.mhead').onclick=()=>el.classList.toggle('open');
    if(q) el.classList.add('open');
    root.appendChild(el);
  });
  if(!shown) root.innerHTML='<div class="stat">Sin resultados.</div>';
}
function renderVen(){
  const days=parseInt(document.getElementById('per').value,10);
  const now=new Date();const cut=new Date(now.getTime()-days*86400000);
  const inRange=DATA.ventas.filter(v=>{if(!v.fecha)return false;const d=new Date(v.fecha+'T00:00:00');return d>=cut&&d<=now;});
  const byModel={};
  inRange.forEach(v=>{byModel[v.modelo]=(byModel[v.modelo]||0)+1;});
  const top=Object.entries(byModel).sort((a,b)=>b[1]-a[1]);
  const root=document.getElementById('venView');
  let html=`<div class="stat"><div>Ventas en el periodo</div><div class="big">${inRange.length}</div>
    <div class="note">${document.getElementById('per').selectedOptions[0].text} · relativo a hoy</div></div>`;
  html+=`<div class="stat"><div style="font-weight:700;margin-bottom:6px">Más vendidos</div>`;
  if(!top.length) html+='<div class="note">Sin ventas en el periodo.</div>';
  top.slice(0,15).forEach((t,i)=>{html+=`<div class="srow"><div class="n"><span class="rank">${i+1}.</span>${t[0]}</div><div class="v">${t[1]}</div></div>`;});
  html+='</div>';
  html+=`<div class="stat"><div style="font-weight:700;margin-bottom:6px">Conteo por modelo (${top.length})</div><div class="grid">`;
  top.forEach(t=>{html+=`<div class="srow"><div class="n">${t[0]}</div><div class="v">${t[1]}</div></div>`;});
  html+='</div></div>';
  root.innerHTML=html;
}
</script></body></html>
