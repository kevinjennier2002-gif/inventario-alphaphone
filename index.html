<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario Alpha Phone</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1115;--card:#1a1d24;--card2:#232733;--line:#2c313c;--txt:#e8eaed;--mut:#9aa0ac;--acc:#3b82f6;--acc2:#2563eb;--ok:#22c55e;--okbg:#0e2a1a;--sold:#f59e0b;--soldbg:#2a1f0e;--loc:#a855f7;--locbg:#1e1330;--err:#ef4444}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);line-height:1.45;-webkit-font-smoothing:antialiased}
.wrap{max-width:920px;margin:0 auto;padding:18px 16px 60px}
header{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#22c55e);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.sub{color:var(--mut);font-size:12.5px;margin-bottom:18px}
.search{position:relative;margin-bottom:14px}
.search input{width:100%;padding:15px 16px 15px 46px;font-size:16px;border-radius:14px;border:1px solid var(--line);background:var(--card);color:var(--txt);outline:none}
.search input:focus{border-color:var(--acc)}
.search .ic{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px;opacity:.6}
.clearbtn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--card2);border:none;color:var(--mut);width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:15px;display:none}
.filters{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.pill{padding:8px 16px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--mut);font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s}
.pill.on{background:var(--acc);border-color:var(--acc);color:#fff}
.lbl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);margin:6px 2px 6px}
.filters.loc .pill.on{background:var(--loc);border-color:var(--loc)}
#locWrap.hide{display:none}
.bigbtn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin:14px 0 18px;box-shadow:0 4px 14px rgba(59,130,246,.3)}
.bigbtn:active{transform:scale(.99)}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.stat .n{font-size:28px;font-weight:800;letter-spacing:-1px}
.stat .l{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.stat.ok .n{color:var(--ok)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:4px 0;margin-bottom:18px;overflow:hidden;display:none}
.panel.show{display:block}
.panel h3{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);padding:14px 18px 8px}
.panel h3.hide{display:none}
table{width:100%;border-collapse:collapse;font-size:14px}
table.hide{display:none}
th,td{text-align:left;padding:9px 18px;border-bottom:1px solid var(--line)}
th{color:var(--mut);font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
td.q{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
tr:last-child td{border-bottom:none}
.trow td{font-weight:800;background:var(--card2)}
.group{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}
.ghead{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;gap:10px}
.ghead:hover{background:var(--card2)}
.gname{font-weight:700;font-size:15.5px}
.gright{display:flex;align-items:center;gap:10px}
.badge{background:var(--okbg);color:var(--ok);font-weight:800;font-size:14px;min-width:30px;text-align:center;padding:4px 11px;border-radius:999px}
.badge.sold{background:var(--soldbg);color:var(--sold)}
.chev{color:var(--mut);font-size:13px;transition:.2s}
.group.open .chev{transform:rotate(90deg)}
.gbody{display:none;border-top:1px solid var(--line)}
.group.open .gbody{display:block}
.colorrow{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;font-size:13px;color:var(--mut);background:var(--card2)}
.colorrow b{color:var(--txt)}
.unit{display:flex;flex-wrap:wrap;gap:6px 10px;align-items:center;padding:10px 16px;border-top:1px solid var(--line);font-size:13px}
.tag{background:var(--card2);padding:3px 9px;border-radius:7px;font-size:12px;color:var(--mut)}
.tag.c{color:var(--txt);font-weight:600}
.tag.loc{background:var(--locbg);color:#c89bff;font-weight:600}
.uthumb{width:48px;height:48px;border-radius:8px;object-fit:cover;background:var(--card2);flex-shrink:0;border:1px solid var(--line)}
.imei{margin-left:auto;font-family:ui-monospace,monospace;font-size:11.5px;color:#6b7280}
.empty{text-align:center;color:var(--mut);padding:50px 20px}
.foot{text-align:center;color:#5a6070;font-size:11.5px;margin-top:24px}
.logout{background:none;border:1px solid var(--line);color:var(--mut);font-size:12px;padding:6px 12px;border-radius:9px;cursor:pointer;margin-left:auto}
#lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.lockbox{width:100%;max-width:360px;text-align:center}
.lockbox .logo{margin:0 auto 18px;width:62px;height:62px;border-radius:18px;font-size:32px}
.pwrow{position:relative;margin-bottom:12px}
.pwrow input{width:100%;padding:15px 16px;font-size:16px;text-align:center;letter-spacing:1px;border-radius:14px;border:1px solid var(--line);background:var(--card);color:var(--txt);outline:none}
.pwrow input:focus{border-color:var(--acc)}
.pwrow.bad input{border-color:var(--err);animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
#unlockBtn{width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-size:16px;font-weight:700;cursor:pointer}
#unlockBtn:disabled{opacity:.6;cursor:default}
.errmsg{color:var(--err);font-size:13px;margin-top:12px;min-height:18px}
#app{display:none}
@media(max-width:480px){.cards{grid-template-columns:1fr 1fr}.stat .n{font-size:24px}}
</style>
</head>
<body>

<div id="lock">
  <div class="lockbox">
    <div class="logo">&#128274;</div>
    <div class="pwrow" id="pwrow">
      <input id="pw" type="password" inputmode="text" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Contrase&ntilde;a" autocomplete="off" autofocus>
    </div>
    <button id="unlockBtn" type="button" onclick="attempt()">Entrar</button>
    <div class="errmsg" id="err"></div>
    <div id="ver" style="color:#6b7280;font-size:11px;margin-top:20px">v6</div>
  </div>
</div>

<div id="app">
<div class="wrap">
<header>
<div class="logo">&#128241;</div>
<div><h1>Inventario Alpha Phone</h1></div>
<button class="logout" id="logout">&#128274; Salir</button>
</header>
<div class="sub">Datos al 14/06/2026 &middot; busca un modelo o toca &ldquo;Ver resumen total&rdquo;.</div>

<div class="search">
<span class="ic">&#128269;</span>
<input id="q" type="text" placeholder="Buscar modelo&hellip; ej: 17 pro max, iPhone 14, samsung" autocomplete="off">
<button class="clearbtn" id="clear">&#10005;</button>
</div>

<div class="lbl">Estatus</div>
<div class="filters">
<button class="pill on" data-f="DISPONIBLE">&#9989; Disponibles</button>
<button class="pill" data-f="VENDIDO">&#128176; Vendidos</button>
<button class="pill" data-f="TODOS">&#128230; Todos</button>
</div>

<div id="locWrap">
<div class="lbl">Sucursal</div>
<div class="filters loc" id="locFilters"></div>
</div>

<button class="bigbtn" id="totalBtn">&#128202; Ver resumen total</button>

<div class="cards">
<div class="stat ok"><div class="n" id="cTotal">0</div><div class="l">Equipos</div></div>
<div class="stat"><div class="n" id="cModelos">0</div><div class="l">Modelos distintos</div></div>
</div>

<div class="panel" id="panel">
<h3 id="hLoc">Total por sucursal</h3>
<table id="tLoc"></table>
<h3>Total por modelo</h3>
<table id="tModel"></table>
<h3>Total por modelo y color</h3>
<table id="tColor"></table>
</div>

<div id="results"></div>
<div class="foot">Alpha Phone &middot; herramienta interna &middot; datos cifrados</div>
</div>
</div>

function b64(s){var b=atob(s),u=new Uint8Array(b.length);for(var i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
async function unlock(pw){
  var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(ENC.salt),iterations:120000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(ENC.iv)},key,b64(ENC.ct));
  return JSON.parse(new TextDecoder().decode(new Uint8Array(pt)));
}
async function attempt(){
  var pw=$('#pw').value.trim();
  if(!pw)return;
  if(!(window.crypto&&window.crypto.subtle)){
    $('#err').textContent='Este navegador no permite cifrado (abre el enlace en Safari o Chrome, no dentro de otra app).';
    return;
  }
  $('#unlockBtn').disabled=true;$('#unlockBtn').textContent='Abriendo...';$('#err').textContent='';
  try{
    DATA=await unlock(pw);
    $('#lock').style.display='none';
    $('#app').style.display='block';
    initApp();
  }catch(e){
    $('#pwrow').classList.add('bad');
    var nm=(e&&e.name)?e.name:'Error';
    $('#err').textContent=(nm==='OperationError')?'Contraseña incorrecta.':('No se pudo abrir ('+nm+').');
    $('#pw').value='';
    setTimeout(function(){$('#pwrow').classList.remove('bad');},400);
  }finally{
    $('#unlockBtn').disabled=false;$('#unlockBtn').textContent='Entrar';
  }
}
document.addEventListener('DOMContentLoaded',function(){
  var b=$('#unlockBtn'); if(b) b.addEventListener('click',attempt);
  var p=$('#pw'); if(p) p.addEventListener('keydown',function(e){if(e.key==='Enter')attempt();});
  var lo=$('#logout'); if(lo) lo.addEventListener('click',function(){DATA=[];location.reload();});
  try{ $('#ver').textContent='v6 · cripto:'+((window.crypto&&window.crypto.subtle)?'OK':'NO'); }catch(_){}
});

function initApp(){
  var locs=[];var seen={};
  DATA.forEach(function(d){if(d.estatus==='DISPONIBLE'&&d.ubic&&!seen[d.ubic]){seen[d.ubic]=1;locs.push(d.ubic);}});
  locs.sort();
  var cont=$('#locFilters');
  cont.innerHTML='<button class="pill on" data-l="TODAS">&#127970; Todas</button>'+
    locs.map(function(l){return '<button class="pill" data-l="'+l+'">&#128205; '+cap(l)+'</button>';}).join('');
  cont.querySelectorAll('.pill').forEach(function(p){p.addEventListener('click',function(){
    cont.querySelectorAll('.pill').forEach(function(x){x.classList.remove('on');});
    p.classList.add('on');loc=p.dataset.l;render();if($('#panel').classList.contains('show'))renderTotals();
  });});
  $('#q').addEventListener('input',function(e){query=e.target.value;$('#clear').style.display=query?'block':'none';render();if($('#panel').classList.contains('show'))renderTotals();});
  $('#clear').addEventListener('click',function(){query='';$('#q').value='';$('#clear').style.display='none';render();if($('#panel').classList.contains('show'))renderTotals();});
  document.querySelectorAll('.filters:not(.loc) .pill').forEach(function(p){p.addEventListener('click',function(){document.querySelectorAll('.filters:not(.loc) .pill').forEach(function(x){x.classList.remove('on');});p.classList.add('on');filter=p.dataset.f;render();if($('#panel').classList.contains('show'))renderTotals();});});
  $('#totalBtn').addEventListener('click',function(){var pn=$('#panel');pn.classList.toggle('show');if(pn.classList.contains('show')){renderTotals();$('#totalBtn').textContent='📊 Ocultar resumen total';pn.scrollIntoView({behavior:'smooth',block:'nearest'});}else $('#totalBtn').textContent='📊 Ver resumen total';});
  render();
}

function active(){return DATA.filter(function(d){return (filter==='TODOS'||d.estatus===filter)&&(!showLoc()||loc==='TODAS'||d.ubic===loc);});}
function matches(d,q){if(!q)return true;var base=(d.modelo+' '+d.color+' '+d.gb+(d.estatus==='DISPONIBLE'?' '+d.ubic:'')).toLowerCase();var im=(d.imei||'').toLowerCase();return q.toLowerCase().split(/\s+/).every(function(t){if(!t)return true;if(base.indexOf(t)>=0)return true;if(t.length>=7&&im.indexOf(t)>=0)return true;return false;});}
function fmtPrecio(p){if(!p)return'';var n=parseFloat(String(p).replace(/[^0-9.]/g,''));if(!n)return'';return'$'+n.toLocaleString('es-MX');}

function syncLocUI(){
  $('#locWrap').classList.toggle('hide',!showLoc());
  if(!showLoc()){loc='TODAS';$('#locFilters').querySelectorAll('.pill').forEach(function(x,i){x.classList.toggle('on',i===0);});}
}

function render(){
  syncLocUI();
  var list=active().filter(function(d){return matches(d,query);});
  $('#cTotal').textContent=list.length;
  var mset={};list.forEach(function(d){mset[d.modelo]=1;});
  $('#cModelos').textContent=Object.keys(mset).length;
  $('.stat.ok .n').style.color=sold()?'var(--sold)':'var(--ok)';
  var groups={};list.forEach(function(d){(groups[d.modelo]=groups[d.modelo]||[]).push(d);});
  var order=Object.keys(groups).sort(function(a,b){return groups[b].length-groups[a].length||a.localeCompare(b);});
  var R=$('#results');
  if(list.length===0){R.innerHTML='<div class="empty">No se encontraron equipos.<br>Prueba con otro modelo o sucursal.</div>';return;}
  R.innerHTML=order.map(function(m){
    var items=groups[m];
    var open=(query&&order.length<=3)?'open':'';
    var cc={};items.forEach(function(d){cc[d.color]=(cc[d.color]||0)+1;});
    var colorLines=Object.keys(cc).sort(function(a,b){return cc[b]-cc[a];}).map(function(c){var n=cc[c];return '<div class="colorrow"><span>&#127912; <b>'+c+'</b></span><span>'+n+' equipo'+(n>1?'s':'')+'</span></div>';}).join('');
    var units=items.map(function(d){return '<div class="unit">'+
        (d.img?'<a href="'+(d.fld||d.img)+'" target="_blank" rel="noopener"><img class="uthumb" loading="lazy" src="'+d.img+'"></a>':'')+
        '<span class="tag c">'+d.color+'</span>'+
        (d.gb?'<span class="tag">'+d.gb+'</span>':'')+
        (d.sim?'<span class="tag">'+d.sim+'</span>':'')+
        (d.grado?'<span class="tag">Grado '+d.grado+'</span>':'')+
        (d.estatus==='DISPONIBLE'&&d.ubic?'<span class="tag loc">&#128205; '+cap(d.ubic)+'</span>':'')+
        (fmtPrecio(d.precio)?'<span class="tag">'+fmtPrecio(d.precio)+'</span>':'')+
        '<span class="imei">'+(d.imei||'-')+'</span>'+
      '</div>';}).join('');
    return '<div class="group '+open+'">'+
      '<div class="ghead" onclick="this.parentNode.classList.toggle(\'open\')">'+
        '<span class="gname">'+m+'</span>'+
        '<span class="gright"><span class="badge '+(sold()?'sold':'')+'">'+items.length+'</span><span class="chev">&#9654;</span></span>'+
      '</div>'+
      '<div class="gbody">'+colorLines+units+'</div>'+
    '</div>';
  }).join('');
}

function renderTotals(){
  var list=active().filter(function(d){return matches(d,query);});
  $('#hLoc').classList.toggle('hide',!showLoc());
  $('#tLoc').classList.toggle('hide',!showLoc());
  if(showLoc()){
    var gl={};list.forEach(function(d){gl[d.ubic]=(gl[d.ubic]||0)+1;});
    var rowsL=Object.keys(gl).sort(function(a,b){return gl[b]-gl[a];}).map(function(l){return '<tr><td>&#128205; '+cap(l)+'</td><td class="q">'+gl[l]+'</td></tr>';}).join('');
    $('#tLoc').innerHTML='<tr><th>Sucursal</th><th style="text-align:right">Cant.</th></tr>'+rowsL+'<tr class="trow"><td>TOTAL</td><td class="q">'+list.length+'</td></tr>';
  }
  var gm={};list.forEach(function(d){gm[d.modelo]=(gm[d.modelo]||0)+1;});
  var rowsM=Object.keys(gm).sort(function(a,b){return gm[b]-gm[a]||a.localeCompare(b);}).map(function(m){return '<tr><td>'+m+'</td><td class="q">'+gm[m]+'</td></tr>';}).join('');
  $('#tModel').innerHTML='<tr><th>Modelo</th><th style="text-align:right">Cant.</th></tr>'+rowsM+'<tr class="trow"><td>TOTAL</td><td class="q">'+list.length+'</td></tr>';
  var gc={};list.forEach(function(d){var k=d.modelo+'||'+d.color;gc[k]=(gc[k]||0)+1;});
  var rowsC=Object.keys(gc).sort(function(a,b){return gc[b]-gc[a]||a.localeCompare(b);}).map(function(k){var p=k.split('||');return '<tr><td>'+p[0]+'</td><td>'+p[1]+'</td><td class="q">'+gc[k]+'</td></tr>';}).join('');
  $('#tColor').innerHTML='<tr><th>Modelo</th><th>Color</th><th style="text-align:right">Cant.</th></tr>'+rowsC+'<tr class="trow"><td colspan="2">TOTAL</td><td class="q">'+list.length+'</td></tr>';
}
</script>
</body>
</html>
