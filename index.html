<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inventario Alpha Phone</title>
<style>
:root{--bg:#0b1020;--card:#151c30;--card2:#1b2340;--acc:#3b82f6;--acc2:#22c55e;--txt:#e8edf7;--mut:#8b97b3;--bd:#26304d}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt)}
.wrap{max-width:1100px;margin:0 auto;padding:16px}
.lock{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.lockbox{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:28px;max-width:360px;width:100%;text-align:center}
.lockbox h1{font-size:20px;margin:0 0 4px}
.lockbox p{color:var(--mut);font-size:13px;margin:0 0 18px}
input,select,button{font:inherit}
.fld{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--bd);background:var(--card2);color:var(--txt);outline:none}
.btn{background:var(--acc);color:#fff;border:none;border-radius:10px;padding:12px 16px;cursor:pointer;font-weight:600}
.btn:hover{filter:brightness(1.08)}
.err{color:#f87171;font-size:13px;margin-top:10px;min-height:16px}
header.top{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;margin-bottom:14px}
header.top h1{font-size:20px;margin:0}
.muted{color:var(--mut);font-size:12px}
.tabs{display:flex;gap:8px;margin:10px 0 16px}
.tab{padding:9px 16px;border-radius:999px;border:1px solid var(--bd);background:var(--card);color:var(--txt);cursor:pointer}
.tab.on{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.controls .fld{flex:1;min-width:160px}
.chip{display:inline-block;background:var(--card2);border:1px solid var(--bd);border-radius:999px;padding:3px 10px;font-size:12px;color:var(--mut);margin:2px}
.grp{background:var(--card);border:1px solid var(--bd);border-radius:14px;margin-bottom:14px;overflow:hidden}
.grp h2{margin:0;padding:13px 16px;font-size:16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:var(--card2)}
.grp h2 .cnt{background:var(--acc);color:#fff;border-radius:999px;padding:2px 11px;font-size:13px}
.units{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;padding:14px}
.unit{background:var(--card2);border:1px solid var(--bd);border-radius:12px;padding:12px;display:flex;gap:10px}
.thumb{width:92px;height:92px;border-radius:10px;flex:0 0 92px;background:linear-gradient(135deg,#243056,#39477a);display:flex;align-items:center;justify-content:center;color:#9fb0d8;font-size:22px;text-decoration:none;border:1px solid var(--bd);position:relative;overflow:hidden;cursor:pointer}
.thumb:hover{filter:brightness(1.12)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .zoom{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.62);color:#fff;font-size:10px;padding:2px 6px;border-radius:6px;line-height:1.3}
.thumb .drv{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.62);color:#fff;font-size:11px;padding:2px 6px;border-radius:6px;text-decoration:none}
.lb{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
.lb.on{display:flex}
.lb img{max-width:100%;max-height:88vh;border-radius:12px;box-shadow:0 10px 50px rgba(0,0,0,.6)}
.lb .x{position:absolute;top:14px;right:18px;color:#fff;font-size:30px;cursor:pointer;line-height:1;user-select:none}
.lb .cap{position:absolute;bottom:16px;left:0;right:0;text-align:center;color:#cbd5e1;font-size:13px}
@media(max-width:480px){.units{grid-template-columns:1fr}.thumb{width:104px;height:104px;flex:0 0 104px}}
.unit .info{font-size:13px;line-height:1.5;min-width:0}
.unit .info b{font-size:14px}
.unit .info .imei{color:var(--mut);font-size:11px;word-break:break-all}
.price{color:var(--acc2);font-weight:700}
.sucpill{font-size:11px;color:var(--mut)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.scard{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px;text-align:center}
.scard .big{font-size:30px;font-weight:800}
.scard .lbl{color:var(--mut);font-size:12px;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--bd)}
th{color:var(--mut);font-weight:600;font-size:12px;text-transform:uppercase}
tbody tr:hover{background:var(--card2)}
.rank{color:var(--acc);font-weight:700;width:34px}
.hide{display:none}
.foot{color:var(--mut);font-size:11px;text-align:center;margin:26px 0 10px}
</style>
</head>
<body>
<div id="lock" class="lock">
  <div class="lockbox">
    <div style="font-size:34px">&#128274;</div>
    <h1>Inventario Alpha Phone</h1>
    <p>Contenido cifrado. Ingresa la contrasena para ver el inventario.</p>
    <input id="pw" class="fld" type="password" placeholder="Contrasena" autocomplete="off">
    <div style="height:10px"></div>
    <button id="go" class="btn" style="width:100%">Desbloquear</button>
    <div id="err" class="err"></div>
  </div>
</div>

<div id="app" class="wrap hide"></div>

<div id="lb" class="lb" onclick="closeLB()"><span class="x" onclick="closeLB()">&times;</span><img alt=""><div class="cap"></div></div>

function b64(s){var bin=atob(s),a=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}

async function decrypt(pw){
  var enc=new TextEncoder();
  var km=await crypto.subtle.importKey("raw",enc.encode(pw),{name:"PBKDF2"},false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:b64(BLOB.salt),iterations:BLOB.iter,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(BLOB.iv)},key,b64(BLOB.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

var DATA=null, suc="__ALL__", q="", tab="inv", periodo=30;

function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

function driveLink(imei){return "https://drive.google.com/drive/search?q="+encodeURIComponent(imei);}
function folderLink(e){return e.folder?("https://drive.google.com/drive/folders/"+e.folder):driveLink(e.imei);}
function thumbSrc(id){return "https://drive.google.com/thumbnail?id="+id+"&sz=w400";}
function fullSrc(id){return "https://drive.google.com/thumbnail?id="+id+"&sz=w1200";}

function thumbHTML(e){
  var drv='<a class="drv" href="'+folderLink(e)+'" target="_blank" rel="noopener" title="Abrir en Drive" onclick="event.stopPropagation()">&#8599;</a>';
  if(e.img){
    return '<div class="thumb" onclick="openLB(\''+e.img+'\',\''+esc(e.color||e.modelo)+'\')">'
      +'<img loading="lazy" src="'+thumbSrc(e.img)+'" alt="'+esc(e.modelo)+'" onerror="this.parentNode.innerHTML=&quot;&amp;#128247;&quot;">'
      +'<span class="zoom">&#128269;</span>'+drv+'</div>';
  }
  // sin foto directa: enlace a la carpeta/busqueda de Drive
  return '<a class="thumb" href="'+folderLink(e)+'" target="_blank" rel="noopener" title="Abrir fotos en Drive">&#128247;'
    +(e.folder?'<span class="zoom">Drive</span>':'')+'</a>';
}
function openLB(id,cap){
  var lb=document.getElementById("lb");
  lb.querySelector("img").src=fullSrc(id);
  lb.querySelector(".cap").textContent=cap||"";
  lb.classList.add("on");
}
function closeLB(){document.getElementById("lb").classList.remove("on");document.getElementById("lb").querySelector("img").src="";}

function renderInv(){
  var box=document.getElementById("invView");
  var ql=q.trim().toLowerCase();
  var html="", shown=0;
  DATA.grupos.forEach(function(g){
    var items=g.items.filter(function(e){
      if(suc!=="__ALL__" && e.suc!==suc) return false;
      if(ql){
        var hay=(e.modelo+" "+e.color+" "+e.gb+" "+e.imei+" "+e.sim+" "+e.grado).toLowerCase();
        if(hay.indexOf(ql)<0) return false;
      }
      return true;
    });
    if(!items.length) return;
    shown+=items.length;
    html+='<div class="grp"><h2 onclick="this.nextElementSibling.classList.toggle(\'hide\')"><span>'+esc(g.modelo)+'</span><span class="cnt">'+items.length+'</span></h2><div class="units">';
    items.forEach(function(e){
      html+='<div class="unit">'+thumbHTML(e)+'<div class="info">'
        +'<b>'+esc(e.color||e.modelo)+'</b> '+(e.gb?('<span class="chip">'+esc(e.gb)+(/gb/i.test(e.gb)?'':' GB')+'</span>'):'')
        +'<br>'+(e.sim?'<span class="chip">'+esc(e.sim)+'</span>':'')+(e.bat?'<span class="chip">&#128267; '+esc(e.bat)+'</span>':'')+(e.grado?'<span class="chip">'+esc(e.grado)+'</span>':'')
        +(e.precio?'<br><span class="price">$'+esc(e.precio)+'</span>':'')
        +'<br><span class="sucpill">&#128205; '+esc(e.suc)+'</span>'
        +'<br><span class="imei">IMEI '+esc(e.imei)+'</span>'
        +'</div></div>';
    });
    html+='</div></div>';
  });
  if(!shown) html='<p class="muted">No hay equipos que coincidan con el filtro.</p>';
  box.innerHTML='<div class="muted" style="margin-bottom:10px">'+shown+' equipos mostrados</div>'+html;
}

function renderVentas(){
  var box=document.getElementById("venView");
  var now=new Date();
  var from=new Date(now.getTime()-periodo*86400000);
  var sel=DATA.ventas.filter(function(v){var d=new Date(v.d+"T00:00:00");return d>=from && d<=now;});
  var byModel={};
  sel.forEach(function(v){byModel[v.m]=(byModel[v.m]||0)+1;});
  var arr=Object.keys(byModel).map(function(m){return [m,byModel[m]];}).sort(function(a,b){return b[1]-a[1];});
  var top=arr.slice(0,8);
  var periods=[["7 dias",7],["1 sem",7],["2 sem",14],["1 mes",30],["2 meses",60],["3 meses",90],["4 meses",120],["6 meses",180]];

  periods=[["1 sem",7],["2 sem",14],["1 mes",30],["2 meses",60],["3 meses",90],["4 meses",120],["6 meses",180]];
  var tabs='<div class="tabs" style="flex-wrap:wrap">';
  periods.forEach(function(p){tabs+='<div class="tab'+(periodo===p[1]?' on':'')+'" onclick="periodo='+p[1]+';renderVentas()">'+p[0]+'</div>';});
  tabs+='</div>';
  var cards='<div class="cards">'
    +'<div class="scard"><div class="big">'+sel.length+'</div><div class="lbl">Ventas en el periodo</div></div>'
    +'<div class="scard"><div class="big">'+arr.length+'</div><div class="lbl">Modelos distintos</div></div>'
    +'<div class="scard"><div class="big">'+(top.length?esc(top[0][0].replace("IPHONE ","")):'-')+'</div><div class="lbl">Mas vendido</div></div>'
    +'</div>';
  var t='<div class="grp"><h2><span>Top mas vendidos</span></h2><div style="padding:6px 4px"><table><thead><tr><th>#</th><th>Modelo</th><th>Ventas</th></tr></thead><tbody>';
  if(top.length){top.forEach(function(r,i){t+='<tr><td class="rank">'+(i+1)+'</td><td>'+esc(r[0])+'</td><td>'+r[1]+'</td></tr>';});}
  else{t+='<tr><td colspan="3" class="muted">Sin ventas en este periodo.</td></tr>';}
  t+='</tbody></table></div></div>';
  var full='<div class="grp"><h2 onclick="this.nextElementSibling.classList.toggle(\'hide\')"><span>Conteo por modelo</span><span class="cnt">'+arr.length+'</span></h2><div class="hide" style="padding:6px 4px"><table><thead><tr><th>Modelo</th><th>Ventas</th></tr></thead><tbody>';
  arr.forEach(function(r){full+='<tr><td>'+esc(r[0])+'</td><td>'+r[1]+'</td></tr>';});
  full+='</tbody></table></div></div>';
  box.innerHTML=tabs+cards+t+full;
}

function renderTabs(){
  document.getElementById("invView").classList.toggle("hide",tab!=="inv");
  document.getElementById("venView").classList.toggle("hide",tab!=="ven");
  document.getElementById("ctrlInv").classList.toggle("hide",tab!=="inv");
  document.getElementById("tabInv").classList.toggle("on",tab==="inv");
  document.getElementById("tabVen").classList.toggle("on",tab==="ven");
}

function boot(){
  var app=document.getElementById("app");
  var opts='<option value="__ALL__">Todas las sucursales</option>'+DATA.sucursales.map(function(s){return '<option value="'+esc(s)+'">'+esc(s)+'</option>';}).join("");
  app.innerHTML=''
    +'<header class="top"><h1>&#128241; Inventario Alpha Phone</h1>'
    +'<span class="muted">Actualizado: '+esc(DATA.generado)+'</span></header>'
    +'<div class="tabs"><div id="tabInv" class="tab on" onclick="tab=\'inv\';renderTabs()">Inventario ('+DATA.total_equipos+')</div>'
    +'<div id="tabVen" class="tab" onclick="tab=\'ven\';renderTabs();renderVentas()">Ventas ('+DATA.total_ventas+')</div></div>'
    +'<div id="ctrlInv" class="controls"><input id="q" class="fld" placeholder="Buscar modelo, color, IMEI..."><select id="sucsel" class="fld" style="flex:0 0 220px">'+opts+'</select></div>'
    +'<div id="invView"></div><div id="venView" class="hide"></div>'
    +'<div class="foot">Datos cifrados localmente (AES-GCM). Toca la foto de un equipo para verla en grande; el icono &#8599; abre su carpeta en Google Drive.</div>';
  document.addEventListener("keydown",function(e){if(e.key==="Escape")closeLB();});
  document.getElementById("q").addEventListener("input",function(e){q=e.target.value;renderInv();});
  document.getElementById("sucsel").addEventListener("change",function(e){suc=e.target.value;renderInv();});
  renderInv(); renderTabs();
  document.getElementById("lock").classList.add("hide");
  app.classList.remove("hide");
}

async function attempt(){
  var pw=document.getElementById("pw").value;
  var err=document.getElementById("err");
  err.textContent="";
  try{
    DATA=await decrypt(pw);
    boot();
  }catch(e){
    err.textContent="Contrasena incorrecta.";
  }
}
document.getElementById("go").addEventListener("click",attempt);
document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter")attempt();});
document.getElementById("pw").focus();
</script>
</body>
</html>
